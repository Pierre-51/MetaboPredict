{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Co-Culture</title>

    <link rel="icon" href="{% static 'metabo/logo.png' %}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="//use.fontawesome.com/9ecd38a87f.css">
    <!-- Custom styles -->
    <link href="{% static 'css/styleNeo4j.css' %}" rel="stylesheet">
    <!-- jQuery UI CSS -->
    <link href="https://ajax.googleapis.com/ajax/libs/jqueryui/1.13.2/themes/base/jquery-ui.css" rel="stylesheet" type="text/css" />

    <!-- NeoVis -->
    <script src="https://unpkg.com/neovis.js@2.0.2"></script>
    <!-- XLSX -->
    <script src="https://unpkg.com/xlsx@0.15.1/dist/xlsx.full.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- jQuery UI -->
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.13.2/jquery-ui.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
</head>
<body>

<nav class="navbar sticky-top navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Co-Culture</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/result">Key-Words</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/ways">Ways</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div id="search-home" class="container-fluid search-home bg-white">
    <div class="row h-100 justify-content-center align-items-center">
        <div class="col-10 text-center">
            <div id="selectContainer">
                <select class="select-field">
                    {% for value in var5 %}
                    <option value="{{ value }}" {% if forloop.first %}selected{% endif %}>{{ value }}</option>
                    {% endfor %}
                </select>

                <select class="select-field">
                    {% for value in var5 %}
                    <option value="{{ value }}" {% if forloop.counter == 2 %}selected{% endif %}>{{ value }}</option>
                    {% endfor %}
                </select>
            </div>

            <button id="addButton">➕</button>
            <button id="getSelectedOptions">Launch co-culture 🦠</button>
            <br/>
            <div id="errorMessage" style="display: none;">
                <p style="color:#ea2f3e;">You must choose different organisms</p>
            </div>
            <div id="viz"></div>
            <button id="ALL">ALL</button>
            <button id="EX">Exchanges</button>
            <input id="MOL" type="text" class="w-50 form-control search-input" style="font-size: 16px;"
                   placeholder="Search a Molecule" name="MOL"/>
            <button id="SubMOL">Submit Molecule</button>
            <p id="RXN"></p>
            <div id="viz2"></div>
        </div>
    </div>
</div>

{% block js_block %}
<script>
  const NEO4J_CONFIG = {
    serverUrl: "{{ neo4j_config.url }}",
    serverUser: "{{ neo4j_config.user }}",
    serverPassword: "{{ neo4j_config.password }}"
  };
</script>
<script src="{% static 'neo4j.js' %}"></script>
<script src="{% static 'co_culture.js' %}"></script>
<script>
$(document).ready(function () {

  // Build molecule list from Django context (correct JS array)
  var moleculeList = JSON.parse('{{ var1|escapejs }}');

  // Build organism list from Django context
  var var5 = JSON.parse('{{ var5|escapejs }}');
  var selectCounter = 0;
  var errorMessage = $('#errorMessage');

  // Hide elements until a co-culture is launched
  $('#MOL').hide();
  $('#ALL').hide();
  $('#EX').hide();
  $('#SubMOL').hide();
  $('#viz').hide();
  $('#viz2').hide();

  // ── Add a new organism select ──────────────────────────────────────────────
  $('#addButton').click(function () {
    if (selectCounter < var5.length - 2) {
      var selectField = $('<select></select>').addClass('select-field');
      var removeButton = $('<button>➖</button>');

      $.each(var5, function (i, val) {
        selectField.append($('<option></option>').text(val).val(val));
      });

      var container = $('<div></div>').append(selectField).append(removeButton);
      $('#selectContainer').append(container);
      selectCounter++;

      removeButton.click(function () {
        container.remove();
        selectCounter--;
        if (selectCounter < var5.length - 2) {
          $('#addButton').show();
        }
        errorMessage.hide();
      });

      if (selectCounter === var5.length - 2) {
        $('#addButton').hide();
      }
    }
  });

  // ── Helper: collect selected organism values ───────────────────────────────
  function getSelectedOrganisms() {
    var selected = [];
    $('#selectContainer select').each(function () {
      selected.push($(this).val());
    });
    return selected;
  }

  // ── Helper: detect duplicates ──────────────────────────────────────────────
  function hasDuplicates(array) {
    return (new Set(array)).size !== array.length;
  }

  // ── Launch co-culture ──────────────────────────────────────────────────────
  $('#getSelectedOptions').click(function () {
    var selectedOptions = getSelectedOrganisms();

    if (hasDuplicates(selectedOptions)) {
      errorMessage.show();
      $('#viz').hide();
    } else {
      errorMessage.hide();
      $('#viz').show();
      $('#MOL').show();
      $('#ALL').show();
      $('#EX').show();
      $('#SubMOL').show();

      // Autocomplete on molecule input
      $('#MOL').autocomplete({
        source: moleculeList,
        minLength: 3
      });

      CocultureInit(selectedOptions);
    }
  });

  // ── ALL button ─────────────────────────────────────────────────────────────
  $('#ALL').click(function () {
    CocultureInit(getSelectedOrganisms());
  });

  // ── Exchanges button ───────────────────────────────────────────────────────
  $('#EX').click(function () {
    Exchanges(getSelectedOrganisms());
  });

  // ── Submit molecule button ─────────────────────────────────────────────────
  $('#SubMOL').click(function () {
    CocultureInit(getSelectedOrganisms());
  });

});
</script>
{% endblock %}

</body>
</html>

<body>
    <div id="search-home" class="container-fluid search-home bg-white">
        <div class="row h-100 justify-content-center align-items-center">
            <div class="col-10 text-center">
               <div id="selectContainer">
                   <select class="select-field">
                      {% for value in var5 %}
                      <option value="{{ value }}">{{ value }}</option>
                      {% endfor %}
                    </select>

                    <select class="select-field">
                      {% for value in var5 %}
                      <option value="{{ value }}">{{ value }}</option>
                      {% endfor %}
                    </select>
               </div>
                <button id="addButton">➕</button>
                <button id="getSelectedOptions">Launch co-culture 🦠</button>
                <br/>
                <div id="errorMessage" style="display: none;"><p style="color:#ea2f3e;">You must choose different organism</p></div>
                <div id="viz"></div>
                <button id="ALL">ALL</button>
                <button id="EX">Exchanges</button>
                <input id="MOL" type="text" style="font-size: 16px; width: 30px" class="w-50 form-control-xs-lg search-input" placeholder='Research a Molecule'  name="MOL"/>
                <button id="SubMOL">submit Molecule</button>
                <p id="RXN"></p>
                <div id="viz2"></div>
            </div>
        </div>
    </div>
      {% block js_block %}
        <script src="{% static 'co_culture.js' %}"></script>
        <script>

        $(document).ready(function() {
            $('#MOL').hide();
            $('#ALL').hide();
            $('#EX').hide();
            $('#SubMOL').hide();
          $('#viz').hide();
          $('#viz2').hide();
          var var5 = {{ var5|safe }};
          var selectCounter = 0;
          var errorMessage = $('#errorMessage');

          $('#addButton').click(function() {
            if (selectCounter < var5.length-2) {
              var selectField = $('<select></select>').addClass('select-field');
              var removeButton = $('<button>➖</button>');

              for (var i = 0; i < var5.length; i++) {
                var option = $('<option></option>').text(var5[i]);
                selectField.append(option);
              }

              var container = $('<div></div>').append(selectField).append(removeButton);
              $('#selectContainer').append(container);
              selectCounter++;

              removeButton.click(function() {
                container.remove();
                selectCounter--;

                // Show the "Add" button when a select field is removed
                if (selectCounter < var5.length-2) {
                  $('#addButton').show();
                }
                errorMessage.hide();
              });

              // Hide the "Add" button when the limit is reached
              if (selectCounter === var5.length-2) {
                $('#addButton').hide();
              }
            }
          });
          $('#getSelectedOptions').click(function() {
            var selectedOptions = [];

            $('#selectContainer select').each(function() {
              var selectedOption = $(this).val();
              selectedOptions.push(selectedOption);
            });
            if (hasDuplicates(selectedOptions)) {
                  errorMessage.show();
                  $('#viz').hide();
                } else {
                  errorMessage.hide();
                  $('#viz').show();
                  $('#MOL').show();
                  $('#ALL').show();
                  $('#EX').show();
                  $('#SubMOL').show();
                  $(function () {
                        var all = [
                            '{% for n in var1 %}',
                                '{{n}}',
                            '{% endfor %}'
                            ];
                    $("#MOL").autocomplete({
                        source: all,
                        minLength: 3
                    });
                } );
                  CocultureInit(selectedOptions)
                }
              });
          $('#ALL').click(function() {
            var selectedOptions = [];

            $('#selectContainer select').each(function() {
              var selectedOption = $(this).val();
              selectedOptions.push(selectedOption);
            });
              CocultureInit(selectedOptions)
              });
          $('#EX').click(function() {
            var selectedOptions = [];

            $('#selectContainer select').each(function() {
              var selectedOption = $(this).val();
              selectedOptions.push(selectedOption);
            });
              Exchanges(selectedOptions)
              });
          $('#SubMOL').click(function() {
            var selectedOptions = [];

            $('#selectContainer select').each(function() {
              var selectedOption = $(this).val();
              selectedOptions.push(selectedOption);
            });
              CocultureInit(selectedOptions)
              });
          function hasDuplicates(array) {
            return (new Set(array)).size !== array.length;
          }
        });
        </script>

    {% endblock %}
</body>
</html>
